<!DOCTYPE html>
<html>
<head>
    <title>Favorited Sellers Report</title>
</head>
<body>
    <h1>{{ customer.user.first_name }} {{ customer.user.last_name }}'s Favorited Sellers</h1>
    <ul>
        {% for seller in sellers %}
            <li>{{ seller.user.first_name }} {{ seller.user.last_name }}</li>
        {% empty %}
            <li>No favorited sellers found.</li>
        {% endfor %}
    </ul>
</body>
</html>
