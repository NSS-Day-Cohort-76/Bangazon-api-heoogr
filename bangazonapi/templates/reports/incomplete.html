<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Summary</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
      }
      th,
      td {
        border: 1px solid #ccc;
        padding: 0.75rem;
        text-align: left;
      }
      th {
        background-color: #f2f2f2;
      }
      caption {
        font-size: 1.5rem;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>Order Summary</h1>
    <table>
      <caption>
        Customer Orders
      </caption>
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Customer Name</th>
          <th>Total Cost</th>
        </tr>
      </thead>
      <tbody>
        {% for order in orders %}
        <tr>
          <td>{{ order.order_id }}</td>
          <td>{{ order.customer_name }}</td>
          <td>${{ order.total_cost }}</td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="3">No incomplete orders found.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
